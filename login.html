<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FoundIt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .login-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
        }
        .login-card {
            background: var(--bg-card);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border: 1px solid var(--border);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-main);
        }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }
        .social-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
        }
        .social-btn:hover {
            background: var(--bg-main);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-search-location"></i>
                FoundIt
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="lost-items.html" class="nav-link">Lost Items</a></li>
                <li><a href="found-items.html" class="nav-link">Found Items</a></li>
                <li><a href="report.html" class="nav-link">Report Item</a></li>
                <li><a href="login.html" class="nav-link active">Login</a></li>
            </ul>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h1>
                <p style="color: var(--text-muted);">Log in to manage your reports</p>
            </div>

            <form onsubmit="event.preventDefault(); alert('Login simulated!'); window.location.href='index.html';">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@college.edu" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                        <a href="#" style="font-size: 0.875rem; color: var(--primary);">Forgot?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Log In</button>
            </form>

            <div class="social-login">
                <button class="social-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
                    Google
                </button>
                <button class="social-btn">
                    <i class="fab fa-github"></i>
                    GitHub
                </button>
            </div>

            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.875rem;">
                Don't have an account? <a href="#" style="color: var(--primary); font-weight: 600;">Sign up</a>
            </p>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
